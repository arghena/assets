[match]
dot = true

[formatters]
prettier = ["**/*.yml", "**/*.json"]
tombi = ["**/*.toml"]

[linters]
typos = ["**/*", "![a-z-]+/**"]
yamllint = ["**/*.yml"]
actionlint = [".github/workflows/*.yml"]
tombi = ["**/*.toml"]

[args.linters]
commitlint = ["--strict"]
yamllint = ["--strict"]
tombi = ["--error-on-warnings"]
