name: CodeQL

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

# https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/#languages-and-compilers
on:
  schedule:
    # Runs every Monday.
    - cron: '0 0 * * 1'
  push:
    branches: [canary]
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    name: Run CodeQL
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          build-mode: none
          # https://codeql.github.com/codeql-query-help
          # https://docs.github.com/en/code-security/how-tos/scan-code-for-vulnerabilities/configure-code-scanning/customizing-your-advanced-setup-for-code-scanning#using-queries-in-ql-packs
          queries: security-and-quality
          languages: actions
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          # NOTE: Delete all the old dynamic analysis to get it back to work.
          # https://github.com/github/codeql-action/issues/1179#issuecomment-2050937338
          category: '/language:actions'
          # Only upload caches from the default branch.
          # https://github.com/github/codeql-action/blob/0ec47d036c68ae0cf94c629009b1029407111281/src/trap-caching.ts#L135
