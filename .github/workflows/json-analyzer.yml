name: JSON Analyzer
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
on:
  pull_request:
    paths:
      - '*.json'
      - '.prettierrc.yml'
      - '.editorconfig'
jobs:
  prettier:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set nodejs
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: lts/*
      - name: Run prettier
        run: |
          shopt -s globstar
          npx prettier@latest ./.*.json ./*.json -c --log-level debug
