# NOTE:
# This workflow needs to be committed blindly.
# https://github.com/actions/labeler/blob/main/README.md#initial-set-up-of-the-labeler-action

name: PR Labeler

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Add PR labels
    if: github.repository_owner == 'arghena'
    steps:
      - name: Run title labeler
        uses: github/issue-labeler@c1b0f9f52a63158c4adc09425e858e87b32e9685 # v3.4
        with:
          configuration-path: .github/title-labeler.yml
          enable-versioned-regex: 0
          include-title: 1
          include-body: 0
      - name: Run labeler
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          # https://github.com/arghena/assets/blob/75b39f8b61f216bcfc067fc71e6e63f339766c16/.github/labeler.yml#L10
          dot: false
