# WARNING: This workflow needs to be committed blindly.
# https://github.com/actions/labeler/blob/main/README.md#initial-set-up-of-the-labeler-action
name: PR Labeler
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
on:
  pull_request_target:
    types: [opened, edited, synchronize]
jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Add PR labels
    if: github.repository_owner == 'arghena'
    steps:
      - name: Run title labeler
        uses: github/issue-labeler@v3.4
        with:
          configuration-path: .github/title-labeler.yml
          enable-versioned-regex: 0
          include-title: 1
          include-body: 0
      - name: Run labeler
        uses: actions/labeler@v5
        with:
          dot: false
