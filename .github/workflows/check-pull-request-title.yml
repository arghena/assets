name: Check Pull Request Title

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, edited]

permissions:
  contents: read

jobs:
  insight:
    name: Insight
    if: ${{ github.event.action == 'opened' || github.event.changes.title != null }}
    runs-on: ubuntu-slim
    steps:
      - name: Run Insight
        uses: arghena/insight@de53d6f6d7b8ed376a22042982ead0959d8ba630 # v0.1.0-canary.42
        with:
          check-pull-request-title: true
