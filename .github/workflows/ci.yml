name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha || github.run_id }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-canary.[0-9]+']
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  contents: read

jobs:
  insight:
    name: Insight
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      any-changed: ${{ steps.insight.outputs.any-changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Run Insight
        id: insight
        uses: arghena/insight@7213fb22674afb60fb0a0be8d41a180eafe8789a # v0.1.0-canary.18

  codeql:
    permissions:
      contents: read
      security-events: write
    name: CodeQL
    needs: insight
    if: |
      !cancelled() &&
      (
        github.event_name == 'schedule' ||
        github.ref_type == 'tag' ||
        needs.insight.outputs.any-changed == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v4.31.9
        with:
          build-mode: none
          queries: security-extended,security-and-quality
          languages: actions
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v4.31.9
        with:
          category: '/language:actions'
