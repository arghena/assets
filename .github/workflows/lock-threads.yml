name: Lock Threads

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  lock-threads:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    name: Run lock threads
    if: github.repository_owner == 'arghena'
    steps:
      - name: Lock threads
        uses: dessant/lock-threads@v6
        with:
          add-pr-labels: 'locked'
          pr-inactive-days: 14
          log-output: true
